        }

        .game-header h1 {

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;

        }

        .badge {
            background: #ffcf4a;

            font-size: 0.7rem;
            font-weight: bold;
            padding: 0.2rem 1rem;
            border-radius: 40px;
        }

        /* 统计栏：计时 + 计数 */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #293f36;
            color: #ffefcf;
            margin: 0.5rem 1.5rem 0;
            padding: 0.5rem 1.2rem;
            border-radius: 3rem;
            font-weight: 600;
            gap: 15px;
            flex-wrap: wrap;
        }
        .stat-item {
            background: #1f3a30;
            padding: 0.3rem 1rem;
            border-radius: 3rem;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }
        .stat-value {
            font-size: 1.3rem;
            font-weight: 800;
            font-family: monospace;
            background: #00000033;
            padding: 0 0.4rem;
            border-radius: 1rem;
            min-width: 60px;
            text-align: center;
        }
        .reset-count {
            background: #ffb347;
            border: none;
            color: #2c2b28;
            border-radius: 2rem;
            padding: 0.2rem 0.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
        }
        .reset-count:active {
            transform: scale(0.95);
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;

            background: #fef2e0;
            padding: 0.6rem 1.2rem;

        .meaning-block {

            border-radius: 60px;

        }

        .meaning {
            font-weight: 700;
            font-size: 1.2rem;
            color: #2c5a4a;
        }

            font-family: 'Lucida Sans', 'Segoe UI', monospace;

            background: #f3e5ce;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            margin-left: 0.6rem;
        }

            background: #ffd966;
            border: none;
            font-size: 1.6rem;
            width: 48px;
            height: 48px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.08s linear;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .speak-btn:active {
            transform: scale(0.94);
        }

        .full-word-area {
            background: #eef0ea;
            margin: 0rem 1.5rem 0.5rem;
            padding: 0.6rem;
            border-radius: 2rem;
            text-align: center;
            font-size: 1rem;
            color: #2c5a4a;
            font-weight: 500;
            transition: 0.2s;
            border: 1px dashed #c0cfa5;

            font-size: 1.2rem;
            font-family: monospace;
            letter-spacing: 2px;
            color: #1f6e43;
        }

        .spelling-area {
            background: #ffffff;
            margin: 1rem 1.5rem;

            overflow-y: hidden;
            white-space: nowrap;

            flex-wrap: nowrap;
            justify-content: flex-start;
            align-items: center;
            gap: 0.8rem;
            padding-bottom: 4px;
        }

        .letter-unit, .static-unit {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: #fefaf2;
            border-radius: 1.2rem;
            width: 90px;
            height: 110px;          /* 固定高度，确保所有框一致 */
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            padding: 8px 4px 6px 4px;
        }

        .static-unit {
            background: #edf3e7;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            color: #2d3e2b;

        .letter-display {
            font-size: 2rem;
            font-weight: 800;
            font-family: 'Courier New', monospace;
            background: #fff9f0;
            width: 100%;
            text-align: center;

            border-radius: 1rem;
            margin-bottom: 8px;
            min-height: 82px;
            display: flex;
            align-items: center;
            justify-content: center;

            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .solid-line {
            border-bottom: 4px solid #2c3e2b;
            width: 70%;
            height: 2rem;
            background: #fff0e0;
        }

        .filled-correct {
            background: #d9f0e2;
            color: #1f6e43;
        }

            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding-top: 4px;

            background: #fad89d;
            border: none;
            padding: 5px 10px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 40px;

            transition: 0.05s linear;
            text-transform: lowercase;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);

        .opt-btn:active {
            transform: translateY(2px);
        }

            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

            0% { transform: translateX(0); }

            100% { transform: translateX(0); }
        }

            font-size: 1rem;
            font-weight: 500;
            padding: 0.6rem;

            }
            .stat-value {
                font-size: 1rem;
                min-width: 45px;
            }
        }
    </style>
</head>

        { word: "foot", pronunciation: "/fʊt/", meaning: "脚" },{ word: "hand", pronunciation: "/hænd/", meaning: "手" },
        { word: "head", pronunciation: "/hed/", meaning: "头" },{ word: "leg", pronunciation: "/leɡ/", meaning: "腿" },
        { word: "nose", pronunciation: "/nəʊz/", meaning: "鼻子" },{ word: "mouth", pronunciation: "/maʊθ/", meaning: "嘴巴" },
        { word: "tooth", pronunciation: "/tuːθ/", meaning: "牙齿" },{ word: "hair", pronunciation: "/heə/", meaning: "头发" },
        { word: "arm", pronunciation: "/ɑːm/", meaning: "手臂" },{ word: "knee", pronunciation: "/niː/", meaning: "膝盖" },
        { word: "ship", pronunciation: "/ʃɪp/", meaning: "轮船" },{ word: "train", pronunciation: "/treɪn/", meaning: "火车" },
        { word: "plane", pronunciation: "/pleɪn/", meaning: "飞机" },{ word: "bike", pronunciation: "/baɪk/", meaning: "自行车" },
        { word: "ball", pronunciation: "/bɔːl/", meaning: "球" },{ word: "toy", pronunciation: "/tɔɪ/", meaning: "玩具" },
        { word: "doll", pronunciation: "/dɒl/", meaning: "娃娃" },{ word: "kite", pronunciation: "/kaɪt/", meaning: "风筝" },
        { word: "lion", pronunciation: "/ˈlaɪən/", meaning: "狮子" },{ word: "zoo", pronunciation: "/zuː/", meaning: "动物园" },
        { word: "park", pronunciation: "/pɑːk/", meaning: "公园" },{ word: "farm", pronunciation: "/fɑːm/", meaning: "农场" },
        { word: "river", pronunciation: "/ˈrɪvə/", meaning: "河流" },{ word: "lake", pronunciation: "/leɪk/", meaning: "湖" },
        { word: "hill", pronunciation: "/hɪl/", meaning: "小山" },{ word: "tree", pronunciation: "/triː/", meaning: "树" },
        { word: "grass", pronunciation: "/ɡrɑːs/", meaning: "草" },{ word: "leaf", pronunciation: "/liːf/", meaning: "叶子" },
        { word: "seed", pronunciation: "/siːd/", meaning: "种子" },{ word: "root", pronunciation: "/ruːt/", meaning: "根" },
        { word: "sky", pronunciation: "/skaɪ/", meaning: "天空" },{ word: "cloud", pronunciation: "/klaʊd/", meaning: "云" },
        { word: "rain", pronunciation: "/reɪn/", meaning: "雨" },{ word: "snow", pronunciation: "/snəʊ/", meaning: "雪" },
        { word: "wind", pronunciation: "/wɪnd/", meaning: "风" },{ word: "road", pronunciation: "/rəʊd/", meaning: "路" },
        { word: "shop", pronunciation: "/ʃɒp/", meaning: "商店" },{ word: "hospital", pronunciation: "/ˈhɒspɪtl/", meaning: "医院" },
        { word: "doctor", pronunciation: "/ˈdɒktə/", meaning: "医生" },{ word: "nurse", pronunciation: "/nɜːs/", meaning: "护士" },
        { word: "driver", pronunciation: "/ˈdraɪvə/", meaning: "司机" },{ word: "cook", pronunciation: "/kʊk/", meaning: "厨师" }
    ];

    const WORD_BANK = wordBankData;
    console.log("词汇量:", WORD_BANK.length);

    // 元音/辅音组合
    const VOWEL_COMBS = new Set(['ee', 'ea', 'ai', 'ou', 'ow', 'oo', 'ie', 'ue', 'oa', 'ae', 'ey', 'ay', 'oi', 'oy', 'au', 'ew']);
    const CONSONANT_COMBS = new Set(['ch', 'sh', 'th', 'wh', 'ph', 'ck', 'ng', 'nk', 'gh', 'qu', 'tr', 'dr', 'br', 'cr', 'fr', 'gr', 'pr', 'pl', 'bl', 'cl', 'fl', 'gl', 'sl', 'sc', 'sk', 'sm', 'sn', 'sp', 'st', 'sw', 'tw', 'kn', 'wr']);

    function tokenizeWord(word) {
        let tokens = [];
        let i = 0;
        const w = word.toLowerCase();
        while (i < w.length) {
            let matched = false;
            if (i + 2 <= w.length) {
                let two = w.substring(i, i+2);
                if (VOWEL_COMBS.has(two) || CONSONANT_COMBS.has(two)) {
                    tokens.push({ text: two, type: 'comb' });
                    i += 2;
                    matched = true;
                }
            }
            if (!matched) {
                let ch = w[i];
                let isVowel = 'aeiou'.includes(ch);
                tokens.push({ text: ch, type: isVowel ? 'vowel' : 'consonant' });
                i++;
            }
        }
        return tokens;
    }

    let currentWordObj = null, currentTokens = [], missingPositions = [], allCompleted = false;
    // 计时&计数变量
    let correctCount = 0;
    let currentTimer = 0;
    let timerInterval = null;
    let wordStartTime = null;
    let isTiming = false;
    
    const meaningSpan = document.getElementById('wordMeaning');
    const pronounceSpan = document.getElementById('wordPronounce');
    const speakBtn = document.getElementById('speakBtn');
    const nextBtn = document.getElementById('nextWordBtn');
    const feedbackDiv = document.getElementById('feedbackMsg');
    const chunksContainer = document.getElementById('chunksContainer');
    const fullWordDisplay = document.getElementById('fullWordDisplay');
    const correctCountSpan = document.getElementById('correctCountDisplay');
    const timerDisplaySpan = document.getElementById('timerDisplay');
    const resetCountBtn = document.getElementById('resetCountBtn');

    function updateStatsDisplay() {
        correctCountSpan.textContent = correctCount;
        timerDisplaySpan.textContent = currentTimer.toFixed(1);
    }
    
    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        currentTimer = 0;
        updateStatsDisplay();
        wordStartTime = Date.now();
        isTiming = true;
        timerInterval = setInterval(() => {
            if (isTiming && !allCompleted) {
                const now = Date.now();
                currentTimer = (now - wordStartTime) / 1000;
                updateStatsDisplay();
            } else if (allCompleted) {
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = null;
            }
        }, 100);
    }
    
    function onWordCompleted() {
        if (allCompleted) return;
        allCompleted = true;
        if (isTiming) {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = null;
            isTiming = false;
            const finalTime = (Date.now() - wordStartTime) / 1000;
            currentTimer = finalTime;
            updateStatsDisplay();
        }
        correctCount++;
        updateStatsDisplay();
        showFullWord();
        feedbackDiv.innerHTML = `🎉🎉 完美拼写！ 用时 ${currentTimer.toFixed(1)} 秒 🎉🎉<br>点击喇叭听发音，继续下一个单词吧。`;
        feedbackDiv.className = 'feedback-area success-feedback';
    }
    
    function showFullWord() {
        if (!currentWordObj) return;
        fullWordDisplay.innerHTML = `✨ 完整单词：<span>${currentWordObj.word}</span> ✨`;
    }
    function clearFullWord() {
        fullWordDisplay.innerHTML = `💡 完成全部填空后，完整单词将显示在这里`;
    }

    function getCandidatePoolByMode(mode) {
        if (mode === 'vowel') {
            let vowels = new Set(['a','e','i','o','u']);
            let combos = Array.from(VOWEL_COMBS);
            return [...vowels, ...combos];
        } else {
            let cons = 'bcdfghjklmnpqrstvwxyz'.split('');
            let combos = Array.from(CONSONANT_COMBS);
            return [...cons, ...combos];
        }
    }

    function generateOptions(correctText, mode) {
        let pool = getCandidatePoolByMode(mode);
        let candidates = pool.filter(item => item !== correctText);
        let shuffled = [...candidates];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        let dists = shuffled.slice(0, 3);
        let options = [correctText, ...dists];
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        return options;
    }

    function buildGameForWord(wordObj) {
        const tokens = tokenizeWord(wordObj.word);
        const mode = Math.random() < 0.5 ? 'vowel' : 'consonant';
        let missing = [];
        for (let i = 0; i < tokens.length; i++) {
            const token = tokens[i];
            let isTarget = false;
            if (mode === 'vowel') {
                if (token.type === 'vowel' || (token.type === 'comb' && VOWEL_COMBS.has(token.text))) isTarget = true;
            } else {
                if (token.type === 'consonant' || (token.type === 'comb' && CONSONANT_COMBS.has(token.text))) isTarget = true;
            }
            if (isTarget) {
                missing.push({
                    idx: i,
                    correctText: token.text,
                    filledText: null,
                    options: generateOptions(token.text, mode)
                });
            }
        }
        if (missing.length === 0) {
            const altMode = mode === 'vowel' ? 'consonant' : 'vowel';
            for (let i = 0; i < tokens.length; i++) {
                const token = tokens[i];
                let isTarget = false;
                if (altMode === 'vowel') {
                    if (token.type === 'vowel' || (token.type === 'comb' && VOWEL_COMBS.has(token.text))) isTarget = true;
                } else {
                    if (token.type === 'consonant' || (token.type === 'comb' && CONSONANT_COMBS.has(token.text))) isTarget = true;
                }
                if (isTarget) {
                    missing.push({
                        idx: i,
                        correctText: token.text,
                        filledText: null,
                        options: generateOptions(token.text, altMode)
                    });
                }
            }
            if (missing.length === 0) missing = [{ idx:0, correctText:tokens[0].text, filledText:null, options: generateOptions(tokens[0].text, altMode) }];
        }
        return { tokens, missing };
    }

    function renderSpelling(tokens, missingMap, allCompletedFlag) {
        chunksContainer.innerHTML = '';
        for (let i = 0; i < tokens.length; i++) {
            const token = tokens[i];
            const missItem = missingMap.get(i);
            if (missItem) {
                const unitDiv = document.createElement('div');
                unitDiv.className = 'letter-unit';
                const displayDiv = document.createElement('div');
                displayDiv.className = 'letter-display';
                if (missItem.filledText) {
                    displayDiv.textContent = missItem.filledText;
                    displayDiv.classList.add('filled-correct');
                } else {
                    const placeholder = document.createElement('div');
                    placeholder.className = 'missing-placeholder';
                    const line = document.createElement('div');
                    line.className = 'solid-line';
                    placeholder.appendChild(line);
                    displayDiv.appendChild(placeholder);
                }
                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options-area';
                missItem.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.textContent = opt;
                    btn.classList.add('opt-btn');
                    if (allCompletedFlag) {
                        btn.disabled = true;
                        btn.classList.add('disabled-btn');
                    }
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (allCompleted) return;
                        if (missItem.filledText === opt) return;
                        if (opt === missItem.correctText) {
                            missItem.filledText = opt;
                            let allCorrect = true;
                            for (let m of missingPositions) {
                                if (!m.filledText || m.filledText !== m.correctText) {
                                    allCorrect = false;
                                    break;
                                }
                            }
                            if (allCorrect) {
                                onWordCompleted();
                                renderSpelling(tokens, missingMap, true);
                            } else {
                                renderSpelling(tokens, missingMap, false);
                                let filledCnt = missingPositions.filter(m => m.filledText !== null).length;
                                feedbackDiv.innerHTML = `📝 已完成 ${filledCnt}/${missingPositions.length} 个空缺，继续选择正确的字母/组合！`;
                                feedbackDiv.className = 'feedback-area';
                                clearFullWord();
                            }
                        } else {
                            feedbackDiv.innerHTML = `❌ 错误！ “${opt}” 不正确，再试试看吧！ ❌`;
                            feedbackDiv.className = 'feedback-area';
                            feedbackDiv.style.background = "#ffe0e0";
                            setTimeout(() => { if(feedbackDiv) feedbackDiv.style.background = "#f4efe6"; }, 800);
                            btn.classList.add('error-shake');
                            setTimeout(() => btn.classList.remove('error-shake'), 400);
                            clearFullWord();
                        }
                    });
                    optionsDiv.appendChild(btn);
                });
                unitDiv.appendChild(displayDiv);
                unitDiv.appendChild(optionsDiv);
                chunksContainer.appendChild(unitDiv);
            } else {
                const staticDiv = document.createElement('div');
                staticDiv.className = 'static-unit';
                staticDiv.textContent = token.text;
                chunksContainer.appendChild(staticDiv);
            }
        }
    }

    function loadNewWord() {
        if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = null;
        const randomIdx = Math.floor(Math.random() * WORD_BANK.length);
        currentWordObj = { ...WORD_BANK[randomIdx] };
        meaningSpan.innerText = currentWordObj.meaning;
        pronounceSpan.innerText = currentWordObj.pronunciation;
        const { tokens, missing } = buildGameForWord(currentWordObj);
        currentTokens = tokens;
        missingPositions = missing;
        allCompleted = false;
        const missingMap = new Map();
        missingPositions.forEach(m => missingMap.set(m.idx, m));
        renderSpelling(currentTokens, missingMap, false);
        feedbackDiv.innerHTML = `✨ 单词共有 ${missingPositions.length} 个空缺，点击下方小写字母(组合)补全！ ✨`;
        feedbackDiv.className = 'feedback-area';
        feedbackDiv.style.background = "#f4efe6";
        clearFullWord();
        startTimer();
    }

    function speakBritish() {
        if (!currentWordObj) return;
        const word = currentWordObj.word;
        if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = 'en-GB';
        utterance.rate = 0.85;
        const voices = window.speechSynthesis.getVoices();
        const ukVoice = voices.find(voice => voice.lang === 'en-GB' || voice.lang.startsWith('en-GB'));
        if (ukVoice) utterance.voice = ukVoice;
        window.speechSynthesis.speak(utterance);
    }

    function resetCounter() {
        correctCount = 0;
        updateStatsDisplay();
        feedbackDiv.innerHTML = "✅ 正确计数已重置，继续挑战！";
        setTimeout(() => {
            if(feedbackDiv.innerHTML.includes("正确计数已重置")) 
                feedbackDiv.innerHTML = `✨ 单词共有 ${missingPositions.length} 个空缺，点击下方小写字母(组合)补全！ ✨`;
        }, 1500);
    }

    speakBtn.addEventListener('click', speakBritish);
    nextBtn.addEventListener('click', () => loadNewWord());
    resetCountBtn.addEventListener('click', resetCounter);
    
    loadNewWord();

    if (window.speechSynthesis) window.speechSynthesis.onvoiceschanged = () => {};
</script>
